<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Collections Catalogue | GR STORE</title>
  <link rel="stylesheet" href="assets/css/style.css">

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              blue: '#0f1e36',
              'blue-light': '#1e3a8a',
              orange: '#f68b1e',
              'orange-dark': '#e07a14'
            }
          },
          fontFamily: {
            sans: ['Montserrat', 'sans-serif'],
            display: ['Montserrat', 'sans-serif'],
            mono: ['JetBrains Mono', 'monospace']
          }
        }
      }
    }
  </script>
</head>
<body class="min-h-screen bg-slate-50 flex flex-col font-sans pb-20 md:pb-0" id="gr-store-app-root">

  <!-- Header -->
  <div id="header-container"></div>

  <!-- Main Content Area -->
  <main class="flex-1 w-full max-w-7xl mx-auto px-4 py-6">
    
    <!-- CATEGORIES GRID VIEW -->
    <div id="categories-list-view" class="max-w-4xl mx-auto px-4 py-6 md:py-10">
      <!-- Title & Introduction -->
      <div class="text-center mb-8 md:mb-12">
        <span class="text-xs font-semibold tracking-wider text-brand-orange uppercase bg-brand-orange/10 border border-brand-orange/20 px-3 py-1 rounded-full w-fit mx-auto flex items-center gap-1 mb-3">
          <i data-lucide="sparkles" class="w-3.5 h-3.5 text-brand-orange"></i>
          <span>The Gold & Rock Catalogue</span>
        </span>
        <h2 class="text-2xl md:text-3xl font-bold font-display text-slate-900 leading-tight">
          Browse Handcrafted Collections
        </h2>
        <p class="text-sm text-slate-500 font-light mt-2 max-w-md mx-auto">
          Explore artisanal leather products crafted with absolute precision, double-stitching, and premium organic materials.
        </p>
      </div>

      <!-- Grid list -->
      <div id="categories-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-6">
        <!-- Dynamically populated -->
      </div>
    </div>


    <!-- SPECIFIC CATEGORY PRODUCTS VIEW -->
    <div id="category-products-view" class="hidden flex flex-col gap-6 max-w-7xl mx-auto py-6">
      
      <!-- Breadcrumbs / Back button -->
      <div class="flex items-center gap-2 text-xs md:text-sm">
        <button id="back-to-collections-btn" class="text-slate-400 hover:text-brand-orange font-semibold flex items-center gap-1 cursor-pointer">
          <i data-lucide="chevron-left" class="w-4 h-4"></i>
          All Collections
        </button>
        <span class="text-slate-300">/</span>
        <span id="active-cat-title" class="text-slate-600 font-bold capitalize">Wallets</span>
      </div>

      <!-- Header title and description of collection -->
      <div class="border-b pb-4">
        <h2 id="active-cat-title" class="text-xl md:text-2xl font-bold font-display text-slate-900 leading-tight capitalize">
          Category Products
        </h2>
        <p id="active-cat-desc" class="text-xs text-slate-400 font-medium mt-1">
          Handcrafted accessories designed with Nigeria's premium full-grain leather.
        </p>
      </div>

      <!-- Products Grid under specific collection -->
      <div id="category-products-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mt-2">
        <!-- Dynamically populated -->
      </div>
    </div>

  </main>

  <!-- Reusable Floating WhatsApp Button -->
  <button id="whatsapp-floating-btn" class="fixed bottom-24 md:bottom-8 right-6 z-30 bg-[#25D366] hover:bg-[#20ba5a] text-white p-3.5 rounded-full shadow-2xl transition-all hover:scale-110 cursor-pointer border border-[#1ebd54]" title="Contact Support via WhatsApp">
    <i data-lucide="message-circle" class="w-6 h-6 fill-white text-white"></i>
  </button>

  <!-- Footers -->
  <div id="footer-container"></div>
  <div id="bottom-nav-container"></div>
  <div id="cart-drawer-container"></div>
  <div id="toast-container"></div>

  <!-- Lucide script -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Shared Data & Logic Scripts -->
  <script src="assets/js/products.js"></script>
  <script src="assets/js/db.js"></script>
  <script src="assets/js/common.js"></script>
  <script src="assets/js/categories.js"></script>
</body>
</html>
